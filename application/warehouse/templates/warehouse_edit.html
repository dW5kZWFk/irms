{% extends 'base.html' %}

{% block head %} {%endblock%}

{% block body %}

<fieldset class="m-3 p-3 w-50 bg-white border border-dark">
     <div class="container-fluid">
        <form method="POST">

            <div class="row">
                        	  <div class="col-lg-3"> <p class="card-text h6 text-end">Schrank-ID:</p> </div>
                        	  <div class="col-auto col-lg-4" >
                              <select class="form-select border border-dark" name="warehouse_shelf_number" id="warehouse_shelf_number" onchange="warehouse_compart_number_ajax(this.value);">
                                <option value=""> - </option>
                                <option value="neu"> Neu </option>
                                    {% for s in shelf_numbers %}
                                     <option value={{s}} {% if s == sel_warehouse["shelf_number"] %} selected {% endif %}>{{s}}</option>
                                    {% endfor %}
                              </select>
                              </div>
                        	  <div class="col-lg-5" id="shelf_number_input"></div>
                        	  </div>
<br>
							<div class="row">
                              <div class="col-lg-3"> <p class="card-text h6 text-end">Fach-ID:</p> </div>
							  <div class="col-auto col-lg-4" id="compart_number_selection">
                                <select class="form-select border border-dark" name="warehouse_compart_number" id="warehouse_compart_number" onchange="warehouse_compart_number_neu(this.value);">
                                <option value=""> - </option>
                                <option value="neu"> Neu </option>
                                    {% for c in initial_compart_numbers %}
                                     <option value={{c}} {% if c == sel_warehouse["compart_number"] %} selected {% endif %}>{{c}}</option>
                                    {% endfor %}
                              </select>

                              </div>
                              <div class="col-lg-5" id="compart_number_input"> </div>
							</div>
<br>
                             <div class="row">
                               <div class="col-lg-3"><p class="card-text h6 text-end">Kisten-ID: </p> </div>
                               <div class="col-lg-4">
                                   <input class="form-control" type="text" placeholder="" name="warehouse_box_number" value="{{sel_warehouse["box_number"]}}" onblur="this.value=removeSpaces(this.value);" required>
                               </div>
                               <div class="col-lg-5"> </div>
                             </div>
<br>

                             <div class="row">
                               <div class="col-lg-3"> <p class="card-text h6 text-end">Beschreibung:</p> </div>
                               <div class="col-lg-4"> <textarea class="form-control border border-dark" name="warehouse_description" placeholder="Adresse" rows="3">{{sel_warehouse["description"]}}</textarea></div>
                               <div class="col-lg-5"></div>
                             </div>
<br>
                             <div class="row">
                                <div class="col-lg-3"> </div>
                                <div class="col-lg-4"> <button type="submit" class="btn btn-primary">Hinzufügen</button> </div>
                                <div class="col-lg-5"></div>
                             </div>
<br>

        </form>
     </div>

</fieldset>


<script>
$(document).ready(function() {

//initial for case pre-selected value is 'neu'
warehouse_shelf_number_neu($('#warehouse_shelf_number').val());

});

//only initial
function warehouse_shelf_number_neu(val){
    if(val=='neu'){
    	$('#shelf_number_input').html(`<input class="form-control" type="text" placeholder="" name="warehouse_shelf_number_new" value="{{sel_warehouse["shelf_number"]}}" onblur="this.value=removeSpaces(this.value);">`);
    }else{
    	$('#shelf_number_input').html("");
    }
}

function warehouse_compart_number_ajax(val){
	switch(val){
		case 'neu':
		    $('#shelf_number_input').html(`<input class="form-control" type="text" placeholder="" name="warehouse_shelf_number_new" value="{{sel_warehouse["shelf_number"]}}" onblur="this.value=removeSpaces(this.value);"
		                                    >`);
		    $("#warehouse_compart_number").val('neu');
	        warehouse_compart_number_neu('neu');
	        break;
	    case '':
	        $('#shelf_number_input').html("");
	         $('#compart_number_input').html("");
	         $('#compart_number_selection').html(`<select onchange="warehouse_compart_number_neu(this.value)" id="warehouse_compart_number" name="warehouse_compart_number">
	                                            <option value=""> - </option> </select>`);
	        console.log("nothing");
	        break;
	    default:
		    $('#shelf_number_input').html("");

		    $.ajax({
		    			url: "{{ url_for( 'warehouse_bp.warehouse_ajax_response' ) }}",
		    			type: "GET",
		    			data: {shelf_number: val},
		    			success: function(resp){

                                if(resp=='error'){
					                $('#ajax_flash_danger').show();
					                $('#ajax_flash_danger_msg').html("Fehler beim holen vorhandener Fach-IDs vom Server (warehouse_ajax_response)");
                                    return;
					            }

		    					var html_str= `<select onchange="warehouse_compart_number_neu(this.value)" id="warehouse_compart_number" name="warehouse_compart_number">`;
		    					html_str += "<option value=\"neu\" selected> Neu </option>";
                                html_str += `"<option value=""> - </option>"`;

		    					var iterator = resp.values();

		    					for(let elements of iterator){
		    						html_str += "<option value=\"";
		    						html_str += elements;
		    						html_str += "\">";
		    						html_str += elements;
		    						html_str += "</option>";
		    					}

		    				html_str+="</select>";

		    				$('#compart_number_selection').html(html_str);
		    				warehouse_compart_number_neu('neu');
   							$('#compart_number_input').html(`<input class="form-control" type="text" placeholder="" name="warehouse_compart_number_new" onblur="this.value=removeSpaces(this.value);"
   							                                  >`);

		      			}
		    });
		    break;
	} //eo switch
}

function warehouse_compart_number_neu(val){

    if(val=='neu'){
    	$('#compart_number_input').html(`<input class="form-control" type="text" placeholder="" name="warehouse_compart_number_new" value="{{sel_warehouse["compart_number"]}}" onblur="this.value=removeSpaces(this.value);">`);
    }else{
    	$('#compart_number_input').html("");
    }
}

function removeSpaces(string) {
 return string.split(' ').join('_');
}

</script>

{%endblock%}
