$('#kategorie').change(function(){
    hide_all();

});// eo on change

function set_form(lang){
	switch(lang) {
		case "ersatzteile":
			$('#input_ersatzteil').show();
			$('#et_bottom').html(bottom);
			start_et_ajax();
			break;
		case "zubehoer":
			$('#input_zubehoer').show();
			$('#zb_bottom').html(bottom);
			start_zb_ajax();
			break;
		case "anderes":
			$('#input_anderes').show();
			$('#a_bottom').html(bottom);
			a_top_kat();
			break;
		default:
			console.log("none");
	}
		set_numbers();
}

//ersatzteile----------------------------------------------------------------------------------------------------------------------
function start_et_ajax(){


	$.ajax({
					url: "{{ url_for( 'inventory_bp.ajax_responsive_categories_input' ) }}",
					type: "GET",
					data: {kat: $('#kategorie').val()},
					success: function(resp){
						if(resp !=0){

							if(resp=='error'){
					            $('#ajax_flash_danger').show();
					            $('#ajax_flash_danger_msg').html("Fehler beim anzeigen der vorhandenen Kategorien (ajax_responsive_categories_input).");
                                return;
					        }

							var html_str= `<select class="form-select border border-secondary" id="ersatzteile_et" onchange="et_top_kat(this.value)" name="ersatzteile_et">`;

							var iterator = resp.values();

							for(let elements of iterator){
								html_str += "<option value=\"";
								html_str += elements;
								html_str += "\">";
								html_str += elements;
								html_str += "</option>";
							}
						}
						html_str+="</select>";

						$('#et_selection').html(html_str);
						et_top_kat(resp[0]);
		  			}
	});

}


function et_top_kat(val){

	$.ajax({
					url: "{{ url_for( 'inventory_bp.ajax_responsive_categories_input' ) }}",
					type: "GET",
					data: {et: val},
					success: function(resp){

							if(resp=='error'){
					            $('#ajax_flash_danger').show();
					            $('#ajax_flash_danger_msg').html("Fehler beim anzeigen der vorhandenen Kategorien (ajax_responsive_categories_input).");
                                return;
					        }

							var html_str= `<select class="form-select border border-secondary" onchange="et_sub_kat(this.value); " name="ersatzteile_top_kat">`;

							var iterator = resp.values();

							for(let elements of iterator){
							html_str += "<option value=\"";
							html_str += elements;
							html_str += "\">";

							}

						html_str+="</select>";

						$('#et_top_kat_selection').html(html_str);
						et_sub_kat(resp[0]);
		  			}
	});
}

function et_sub_kat(val){

		$.ajax({
					url: "{{ url_for( 'inventory_bp.ajax_responsive_categories_input' ) }}",
					type: "GET",
					data: {et_top_kat: val, et_for_top_kat: $('#ersatzteile_et').val()},
					success: function(resp){

							if(resp=='error'){
					            $('#ajax_flash_danger').show();
					            $('#ajax_flash_danger_msg').html("Fehler beim anzeigen der vorhandenen Kategorien (ajax_responsive_categories_input).");
                                return;
					        }

							var html_str= `<select class="form-select border border-secondary" onchange="et_bez(this.value);" name="ersatzteile_sub_kat">`;
								html_str += "<option value=\"neu\" selected> Neu </option>";

							var iterator = resp.values();

							for(let elements of iterator){
							html_str += "<option value=\"";
							html_str += elements;
							html_str += "\">";
							html_str += elements;
							html_str += "</option>";
							}

						html_str+="</select>";

						$('#et_sub_kat_selection').html(html_str);
						$('#et_sub_kat_neu').html(`<input class="form-control border border-secondary" type="text" placeholder="" name="et_sub_kat_input" onblur="this.value=removeSpaces(this.value);" >`);
						et_bez('neu');
		  			}
		});
}

function et_bez(val){
	if(val=='neu'){

} // eo function

function get_warehouse_box_numbers(){

$.ajax({
					url: "{{ url_for( 'warehouse_bp.get_warehouse_box_numbers_ajax' ) }}",
					type: "GET",
					data: {go: 1},
					success: function(resp){

function set_numbers(){
    var $select = $('#numbers');
    for (i=1;i<=100;i++){
        $select.append($('<option></option>').val(i).html(i));
    }
}

function hide_all(){
    $('#input_anderes').hide();
	$('#input_ersatzteil').hide();
	$('#input_zubehoer').hide();
	$('#et_bottom').html('');
	$('#zb_bottom').html('');
	$('#a_bottom').html('');
	$('#numbers').show('');
}

function removeSpaces(string) {
 return string.split(' ').join('_');
