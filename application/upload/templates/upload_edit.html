{% extends 'base.html' %}

{% block head %} {%endblock%}

{% block body %}


        <fieldset class="small mt-3">

            <div class="container-fluid">
            <form method="POST">

                <div class="row mt-3 mb-3">
                    <div class="col-lg-3 h5">
                       Name:
                    </div>
                    <div class="col-lg-4">
                        <input class="form-control border border-dark" name="new_upload_name" value="{{upload.name}}" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-lg-3 h5">
                       Beschreibung:
                    </div>
                    <div class="col-lg-4">
                        <textarea class="form-control border border-dark" name="new_upload_description" rows="5">{{upload.description}}</textarea>
                    </div>
                </div>

                <div class="row mb-5">
                    <div class="col-lg-3 h5">
                        Preis (€):
                    </div>
                    <div class="col-lg-4">
                        <input name="new_upload_price" class="form-control" type="text" pattern="[0-9]{1,4},[0-9]{2}" value="{{upload.price}}" placeholder="10,00" required>
                    </div>
                    <div class="col-lg-5"></div>
                </div>

                <div class="row mb-3">
                    <div class="col-lg-3"> </div>
                    <div class="col-lg-9"> <button type="submit" class="btn btn-primary">Ändern</button></div>
                </div>

            <input type="hidden" name="edit_upload" value="1">
            </form>
            </div>


{%endblock%}
